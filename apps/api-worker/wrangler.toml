name = "sht-api-worker"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# ── Workers & Assets ────────────────────────────────────────────────────────
# Keep the worker lean — no bundled assets here (frontend lives on Pages)

# ── D1 Database ─────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "sht-db"
database_id = "7040f30d-b069-4b33-bc4c-9cb2fd972c21"
migrations_dir = "migrations"

# ── File Storage ─────────────────────────────────────────────────────────────
# Using Supabase Storage (free tier, no credit card needed).
# R2 is NOT used.
#
# Secrets injected via GitHub Actions (never commit values here):
#   SUPABASE_JWT_SECRET      — verifies user tokens
#   SUPABASE_URL             — your Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY — for server-side storage operations

# ── Non-secret environment variables ─────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://smarthousholdtracker.whytesites.workers.dev/"
SUPABASE_STORAGE_BUCKET = "household-documents"

# ── Preview environment ───────────────────────────────────────────────────────
[env.preview]
name = "sht-api-worker-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
ALLOWED_ORIGINS = "https://smarthousholdtracker.whytesites.workers.dev/,http://localhost:3000"
SUPABASE_STORAGE_BUCKET = "household-documents"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "sht-db"
database_id = "7040f30d-b069-4b33-bc4c-9cb2fd972c21"
migrations_dir = "migrations"
