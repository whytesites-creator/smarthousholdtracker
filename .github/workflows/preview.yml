name: 🔍 Preview Deploy (Pull Request)

# Deploys a preview environment for every PR — unique URL per PR
on:
  pull_request:
    branches:
      - main

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true    # Cancel stale preview builds on new pushes

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint & type-check (fast feedback, no deploy cost)
  # ──────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: 🔎 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check Worker
        run: npx tsc --noEmit
        working-directory: apps/api-worker

      - name: Type-check Frontend
        run: npx tsc -b --noEmit
        working-directory: apps/web

      - name: Lint Frontend
        run: npm run lint
        working-directory: apps/web

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy preview Worker (env=preview)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-worker-preview:
    name: ⚙️ Deploy Preview Worker
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: apps/api-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
        working-directory: .

      - name: Deploy preview Worker
        run: npx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set preview Worker secrets
        run: |
          echo "${{ secrets.SUPABASE_JWT_SECRET }}"       | npx wrangler secret put SUPABASE_JWT_SECRET --env preview
          echo "${{ secrets.SUPABASE_URL }}"              | npx wrangler secret put SUPABASE_URL --env preview
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"  | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Build & deploy preview frontend to Cloudflare Pages
  # ──────────────────────────────────────────────────────────────────────────
  deploy-frontend-preview:
    name: 🌐 Deploy Preview Frontend
    runs-on: ubuntu-latest
    needs: deploy-worker-preview
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
        working-directory: .

      - name: Build frontend (preview)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Preview worker URL — update this after first preview worker deploy
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PREVIEW || secrets.VITE_API_BASE_URL }}

      - name: Deploy preview to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sht-web
          directory: apps/web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # No branch: argument → Cloudflare Pages auto-creates a preview URL

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Preview deployed!** Cloudflare Pages preview URL will appear in the deployment status above.\n\nAPI Worker preview: `https://sht-api-worker-preview.your-subdomain.workers.dev`'
            })

