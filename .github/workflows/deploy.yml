name: 🚀 Deploy to Cloudflare (Production)

# Triggers on every push to main branch
on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel an in-flight production deploy

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Run D1 database migrations
  # ──────────────────────────────────────────────────────────────────────────
  migrate-db:
    name: 🗄️ Migrate D1 Database
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Apply D1 migrations (remote / production)
        run: npx wrangler d1 migrations apply sht-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & deploy the Cloudflare Worker (API)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-worker:
    name: ⚙️ Deploy API Worker
    runs-on: ubuntu-latest
    needs: migrate-db
    defaults:
      run:
        working-directory: apps/api-worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Type-check Worker
        run: npx tsc --noEmit

      - name: Deploy Worker to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets (Supabase — no R2/credit card needed)
        # Idempotent — safe to re-run on every deploy.
        # File storage uses Supabase Storage (free tier).
        run: |
          echo "${{ secrets.SUPABASE_JWT_SECRET }}"      | npx wrangler secret put SUPABASE_JWT_SECRET
          echo "${{ secrets.SUPABASE_URL }}"             | npx wrangler secret put SUPABASE_URL
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Build & deploy the React frontend to Cloudflare Pages
  # ──────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend to Pages
    runs-on: ubuntu-latest
    needs: deploy-worker   # Ensure API is up before pointing frontend to it
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Type-check Frontend
        run: npx tsc -b --noEmit

      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sht-web
          directory: apps/web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4: Smoke test — verify everything is live
  # ──────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: 🧪 Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-worker, deploy-frontend]
    steps:
      - name: Wait for propagation
        run: sleep 15

      - name: Health check — API Worker
        run: |
          WORKER_URL="https://smarthousholdtracker.whytesites.workers.dev"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/health")
          echo "Worker health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Workers health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Worker is healthy"

      - name: Health check — Pages (frontend)
        run: |
          PAGES_URL="https://sht-web.pages.dev"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PAGES_URL")
          echo "Pages status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Pages health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Frontend is live"

