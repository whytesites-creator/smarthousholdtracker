name: 🚀 Deploy to Cloudflare (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate-db:
    name: 🗄️ Migrate D1 Database
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: .
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply sht-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-worker:
    name: ⚙️ Deploy API Worker
    runs-on: ubuntu-latest
    needs: migrate-db
    defaults:
      run:
        working-directory: apps/api-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: .
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Set Worker secrets
        run: |
          echo "${{ secrets.SUPABASE_JWT_SECRET }}"        | npx wrangler secret put SUPABASE_JWT_SECRET
          echo "${{ secrets.SUPABASE_URL }}"               | npx wrangler secret put SUPABASE_URL
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"  | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: 🌐 Deploy Frontend to Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: .
      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sht-web
          directory: apps/web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

  smoke-test:
    name: 🧪 Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-worker, deploy-frontend]
    steps:
      - name: Wait for propagation
        run: sleep 20
      - name: Health check — API Worker
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://smarthousholdtracker.whytesites.workers.dev/health")
          [ "$STATUS" = "200" ] && echo "✅ Worker healthy" || (echo "❌ Worker failed: $STATUS" && exit 1)
      - name: Health check — Pages
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://sht-web.pages.dev")
          [ "$STATUS" = "200" ] && echo "✅ Frontend live" || (echo "❌ Pages failed: $STATUS" && exit 1)
