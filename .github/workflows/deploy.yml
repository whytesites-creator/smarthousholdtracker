name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Apply D1 migrations
        run: wrangler d1 migrations apply sht-db --remote --config apps/api-worker/wrangler.toml

      - name: Set Worker secrets
        run: |
          echo "${{ secrets.SUPABASE_JWT_SECRET }}" | wrangler secret put SUPABASE_JWT_SECRET --config apps/api-worker/wrangler.toml
          echo "${{ secrets.SUPABASE_URL }}" | wrangler secret put SUPABASE_URL --config apps/api-worker/wrangler.toml
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | wrangler secret put SUPABASE_SERVICE_ROLE_KEY --config apps/api-worker/wrangler.toml

      - name: Deploy Worker API
        run: wrangler deploy --config apps/api-worker/wrangler.toml

      - name: Build Web App
        run: npm run build --workspace=apps/web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Create Pages project (safe to run if already exists)
        run: wrangler pages project create smarthousholdtracker --production-branch main || true

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy apps/web/dist --project-name smarthousholdtracker --branch main

      - name: Smoke test Worker
        run: |
          WORKER_URL="https://smarthousholdtracker.whytesites.workers.dev"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/health")
          echo "Worker health: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed"
            exit 1
          fi